{% extends 'portal/base.html' %}

{% block titulo %}Registro - Portal Municipal{% endblock %}

{% block contenido %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm border-0 mt-4">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <i class="bi bi-person-plus text-primary" style="font-size: 2.5rem;"></i>
            <h4 class="fw-bold mt-2">Crear Cuenta</h4>
            <p class="text-muted small">Portal Municipal La Estrella</p>
          </div>

          <form method="post" action="{% url 'registro' %}">
            {% csrf_token %}

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label small fw-semibold">Nombre</label>
                <input type="text" name="first_name" class="form-control" required>
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label small fw-semibold">Apellido</label>
                <input type="text" name="last_name" class="form-control" required>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Nombre de usuario</label>
              <input type="text" name="username" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold">RUT (ej: 12.345.678-9)</label>
              <input type="text" name="rut" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Correo electrónico</label>
              <input type="email" name="email" class="form-control" required>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold">Contraseña</label>
              <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-semibold">
              <i class="bi bi-person-check me-2"></i>Registrarse
            </button>
          </form>

          <p class="text-center mt-3 mb-0 small">
            ¿Ya tienes cuenta?
            <a href="{% url 'login' %}" class="fw-semibold">Inicia sesión aquí</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
