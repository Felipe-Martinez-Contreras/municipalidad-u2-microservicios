{% extends 'portal/base.html' %}

{% block titulo %}Iniciar Sesión - Portal Municipal{% endblock %}

{% block contenido %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="card shadow-sm border-0 mt-4">
        <div class="card-body p-4">
          <div class="text-center mb-4">
            <i class="bi bi-building text-primary" style="font-size: 2.5rem;"></i>
            <h4 class="fw-bold mt-2">Iniciar Sesión</h4>
            <p class="text-muted small">Portal Municipal La Estrella</p>
          </div>

          <form method="post" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label small fw-semibold">
                <i class="bi bi-envelope me-1"></i>Correo electrónico
              </label>
              <input type="email" name="email" class="form-control" required autofocus>
            </div>

            <div class="mb-3">
              <label class="form-label small fw-semibold">
                <i class="bi bi-lock me-1"></i>Contraseña
              </label>
              <input type="password" name="password" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-semibold">
              <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
            </button>
          </form>

          <p class="text-center mt-3 mb-0 small">
            ¿No tienes cuenta?
            <a href="{% url 'registro' %}" class="fw-semibold">Regístrate aquí</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
