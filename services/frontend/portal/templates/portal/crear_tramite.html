{% extends 'portal/base.html' %}
{% block titulo %}Nuevo Trámite - Portal Municipal{% endblock %}
{% block contenido %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h4 class="fw-bold mb-4"><i class="bi bi-file-earmark-plus me-2 text-primary"></i>Nuevo Trámite</h4>
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-semibold">Tipo de Trámite</label>
              <select name="tipo" class="form-select" required>
                <option value="">Seleccione un tipo...</option>
                {% for tipo in tipos %}
                <option value="{{ tipo.id }}">{{ tipo.nombre }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">Descripción</label>
              <textarea name="descripcion" class="form-control" rows="4"
                placeholder="Describa detalladamente su solicitud..." required></textarea>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary">
                <i class="bi bi-send me-2"></i>Enviar Trámite
              </button>
              <a href="{% url 'mis_tramites' %}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
