global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  # ─── PROMETHEUS SE MONITOREA A SÍ MISMO ──────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ─── NGINX (stub_status, formato Prometheus vía exporter no disponible) ──
  # nginx stub_status no es formato Prometheus nativo, pero confirma
  # disponibilidad del gateway (up/down)
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
