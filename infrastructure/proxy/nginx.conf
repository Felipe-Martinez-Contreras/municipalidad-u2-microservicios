events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server servicio-auth:8000;
    }
    upstream tramites_service {
        server servicio-tramites:8000;
    }
    upstream bodega_service {
        server servicio-bodega:8000;
    }
    upstream portal_service {
        server servicio-portal:8000;
    }
    upstream ia_service {
        server servicio-ia:8000;
    }

    client_max_body_size 10M;
    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;

    server {
        listen 80;
        server_name _;

        location /nginx_status {
            stub_status on;
            access_log off;
            allow all;
        }

        location /health {
            return 200 'nginx ok';
            add_header Content-Type text/plain;
        }

        location /portal/ {
            proxy_pass http://portal_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://portal_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /tramites/ {
            proxy_pass http://tramites_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /bodega/ {
            proxy_pass http://bodega_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ai/ {
            proxy_pass http://ia_service/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_read_timeout 60s;
        }

        location /auth-admin/ {
            proxy_pass http://auth_service/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect ~^/admin/(.*)$ /auth-admin/$1;
        }

        location /tramites-admin/ {
            proxy_pass http://tramites_service/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect ~^/admin/(.*)$ /tramites-admin/$1;
        }

        location /bodega-admin/ {
            proxy_pass http://bodega_service/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect ~^/admin/(.*)$ /bodega-admin/$1;
        }
    }
}
