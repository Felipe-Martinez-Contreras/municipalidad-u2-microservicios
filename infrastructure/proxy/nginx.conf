events {
    worker_connections 1024;
}

http {
    # ─── UPSTREAMS ────────────────────────────────────────────────────────────
    upstream auth_service {
        server servicio-auth:8000;
    }
    upstream tramites_service {
        server servicio-tramites:8000;
    }
    upstream bodega_service {
        server servicio-bodega:8000;
    }
    upstream portal_service {
        server servicio-portal:8000;
    }

    client_max_body_size 10M;
    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;

    server {
        listen 80;
        server_name _;

        # Health check del gateway
        location /health {
            return 200 'nginx ok';
            add_header Content-Type text/plain;
        }

        # ─── PORTAL (frontend) ────────────────────────────────────────────────
        location / {
            proxy_pass http://portal_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── AUTH ─────────────────────────────────────────────────────────────
        location /api/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/usuarios/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── TRÁMITES ─────────────────────────────────────────────────────────
        location /tramites/ {
            proxy_pass http://tramites_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── BODEGA ───────────────────────────────────────────────────────────
        location /bodega/ {
            proxy_pass http://bodega_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ─── ADMIN DE CADA SERVICIO ───────────────────────────────────────────
        location /auth-admin/ {
            proxy_pass http://auth_service/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /tramites-admin/ {
            proxy_pass http://tramites_service/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /bodega-admin/ {
            proxy_pass http://bodega_service/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
