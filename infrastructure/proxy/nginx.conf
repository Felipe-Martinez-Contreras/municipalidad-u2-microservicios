events {
    worker_connections 1024;
}

http {
    upstream auth_service {
        server servicio-auth:8000;
    }
    upstream tramites_service {
        server servicio-tramites:8000;
    }
    upstream bodega_service {
        server servicio-bodega:8000;
    }
    upstream portal_service {
        server servicio-portal:8000;
    }
    upstream ia_service {
        server servicio-ia:8000;
    }
    upstream grafana_service {
        server grafana:3000;
    }

    client_max_body_size 10M;
    proxy_read_timeout 60s;
    proxy_connect_timeout 60s;
    server_tokens off;

    # ============================
    # Bloque HTTP (80) — solo redirect
    # ============================
    server {
        listen 80;
        server_name _;

        # Útil mantener accesible por HTTP interno para healthchecks/monitoreo
        location /health {
            return 200 'nginx ok';
            add_header Content-Type text/plain;
        }

        location /nginx_status {
            stub_status on;
            access_log off;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ============================
    # Bloque HTTPS (443) — contenido real
    # ============================
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/test.fmartinez.xyz.crt;
        ssl_certificate_key /etc/nginx/ssl/test.fmartinez.xyz.key;

        # --- Endurecimiento TLS ---
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # --- Headers de seguridad (los que ya tenías + HSTS ahora habilitado) ---
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:;" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location /grafana/ {
            proxy_pass http://grafana_service/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /nginx_status {
            stub_status on;
            access_log off;
            allow all;
        }

        location /health {
            return 200 'nginx ok';
            add_header Content-Type text/plain;
        }

        location /portal/ {
            proxy_pass http://portal_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://portal_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/auth/ {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /tramites/ {
            proxy_pass http://tramites_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /bodega/ {
            proxy_pass http://bodega_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/ai/ {
            proxy_pass http://ia_service/ai/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Authorization $http_authorization;
            proxy_read_timeout 60s;
        }

        location /auth-admin/ {
            proxy_pass http://auth_service/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect ~^/admin/(.*)$ /auth-admin/$1;
        }

        location /tramites-admin/ {
            proxy_pass http://tramites_service/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect ~^/admin/(.*)$ /tramites-admin/$1;
        }

        location /bodega-admin/ {
            proxy_pass http://bodega_service/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_redirect ~^/admin/(.*)$ /bodega-admin/$1;
        }
    }
}
