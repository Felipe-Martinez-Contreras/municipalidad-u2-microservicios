<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <rect width="900" height="480" fill="#f0f4f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a5276">Infraestructura — Unidad 1</text>

  <!-- Internet -->
  <rect x="340" y="55" width="220" height="44" rx="8" fill="#2980b9" stroke="#1a5276" stroke-width="2"/>
  <text x="450" y="75" text-anchor="middle" font-size="13" font-weight="bold" fill="white">🌐 Internet</text>
  <text x="450" y="93" text-anchor="middle" font-size="10" fill="#d6eaf8">IP pública: 34.176.168.175</text>

  <line x1="450" y1="99" x2="450" y2="129" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- GCP -->
  <rect x="60" y="129" width="780" height="310" rx="12" fill="#eaf4fb" stroke="#2980b9" stroke-width="2" stroke-dasharray="7,3"/>
