  <text x="450" y="243" text-anchor="middle" font-size="10" fill="#aed6f1">Proxy inverso · Puerto 80/443</text>

  <line x1="450" y1="253" x2="450" y2="278" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Django Monolito -->
  <rect x="270" y="278" width="360" height="56" rx="8" fill="#d35400" stroke="#784212" stroke-width="2"/>
