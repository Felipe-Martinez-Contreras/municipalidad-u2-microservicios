  <text x="450" y="318" text-anchor="middle" font-size="10" fill="#fad7a0">usuarios · tramites · bodega · portal · administracion</text>
  <text x="450" y="330" text-anchor="middle" font-size="10" fill="#fad7a0">Gunicorn · Puerto 8000</text>

  <line x1="450" y1="334" x2="450" y2="359" stroke="#555" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- PostgreSQL -->
  <rect x="330" y="359" width="240" height="48" rx="8" fill="#922b21" stroke="#641e16" stroke-width="2"/>
  <text x="450" y="379" text-anchor="middle" font-size="12" font-weight="bold" fill="white">PostgreSQL 15</text>
  <text x="450" y="397" text-anchor="middle" font-size="10" fill="#fadbd8">municipalidad_db · IP: 10.0.2.3</text>

  <!-- Prometheus + Grafana lateral -->
  <rect x="130" y="278" width="120" height="48" rx="8" fill="#c0392b" stroke="#922b21" stroke-width="1.5"/>
  <text x="190" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Prometheus</text>
  <text x="190" y="314" text-anchor="middle" font-size="9" fill="#fadbd8">:9090</text>

  <rect x="130" y="340" width="120" height="48" rx="8" fill="#e67e22" stroke="#ca6f1e" stroke-width="1.5"/>
  <text x="190" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Grafana</text>
  <text x="190" y="376" text-anchor="middle" font-size="9" fill="#fef9e7">:3000</text>

  <line x1="190" y1="326" x2="190" y2="340" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Backup -->
  <rect x="650" y="278" width="120" height="48" rx="8" fill="#1e8449" stroke="#145a32" stroke-width="1.5"/>
  <text x="710" y="298" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Backup</text>
  <text x="710" y="314" text-anchor="middle" font-size="9" fill="#a9dfbf">backup.sh / restore.sh</text>

  <rect x="650" y="340" width="120" height="48" rx="8" fill="#117a65" stroke="#0e6655" stroke-width="1.5"/>
  <text x="710" y="360" text-anchor="middle" font-size="11" font-weight="bold" fill="white">respaldo_datos</text>
  <text x="710" y="376" text-anchor="middle" font-size="9" fill="#a2d9ce">.json · pg_dump</text>

  <line x1="710" y1="326" x2="710" y2="340" stroke="#aaa" stroke-width="1.5" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
  </defs>
