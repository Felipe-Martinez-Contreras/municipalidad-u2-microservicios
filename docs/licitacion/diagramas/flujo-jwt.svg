<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="500" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">

  <rect width="900" height="500" fill="#f0f4f8" rx="12"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a5276">Flujo de Autenticación JWT entre Servicios</text>

  <!-- Actores -->
  <!-- Cliente -->
  <rect x="30" y="70" width="110" height="44" rx="8" fill="#2980b9" stroke="#1a5276" stroke-width="2"/>
  <text x="85" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Cliente</text>
  <text x="85" y="104" text-anchor="middle" font-size="10" fill="#d6eaf8">Navegador</text>

  <!-- NGINX -->
  <rect x="200" y="70" width="110" height="44" rx="8" fill="#1a5276" stroke="#0d2b45" stroke-width="2"/>
  <text x="255" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="white">NGINX</text>
  <text x="255" y="104" text-anchor="middle" font-size="10" fill="#aed6f1">Gateway</text>

  <!-- Auth -->
  <rect x="370" y="70" width="110" height="44" rx="8" fill="#1e8449" stroke="#145a32" stroke-width="2"/>
  <text x="425" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="white">servicio-1</text>
  <text x="425" y="104" text-anchor="middle" font-size="10" fill="#a9dfbf">Auth · JWT</text>

  <!-- Tramites -->
  <rect x="540" y="70" width="110" height="44" rx="8" fill="#7d3c98" stroke="#4a235a" stroke-width="2"/>
  <text x="595" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="white">servicio-2</text>
  <text x="595" y="104" text-anchor="middle" font-size="10" fill="#d7bde2">Trámites</text>

  <!-- Bodega -->
  <rect x="710" y="70" width="110" height="44" rx="8" fill="#1a5276" stroke="#0d2b45" stroke-width="2"/>
  <text x="765" y="88" text-anchor="middle" font-size="12" font-weight="bold" fill="white">servicio-3</text>
  <text x="765" y="104" text-anchor="middle" font-size="10" fill="#aed6f1">Bodega</text>

  <!-- Líneas verticales de vida -->
  <line x1="85" y1="114" x2="85" y2="460" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="255" y1="114" x2="255" y2="460" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="425" y1="114" x2="425" y2="460" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="595" y1="114" x2="595" y2="460" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="765" y1="114" x2="765" y2="460" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- PASO 1: Login -->
  <rect x="30" y="138" width="820" height="22" rx="4" fill="#d5f5e3" opacity="0.5"/>
  <text x="40" y="153" font-size="11" font-weight="bold" fill="#1e8449">① Login</text>
  <line x1="85" y1="160" x2="245" y2="160" stroke="#2980b9" stroke-width="2" marker-end="url(#arr)"/>
  <text x="160" y="155" text-anchor="middle" font-size="10" fill="#2980b9">POST /api/auth/login/</text>
  <line x1="255" y1="170" x2="415" y2="170" stroke="#1a5276" stroke-width="2" marker-end="url(#arr)"/>
  <text x="335" y="165" text-anchor="middle" font-size="10" fill="#1a5276">email + password</text>

  <!-- PASO 2: Token generado -->
  <rect x="30" y="195" width="820" height="22" rx="4" fill="#d5f5e3" opacity="0.5"/>
  <text x="40" y="210" font-size="11" font-weight="bold" fill="#1e8449">② Token JWT generado</text>
  <rect x="360" y="218" width="130" height="30" rx="6" fill="#1e8449" opacity="0.15" stroke="#1e8449" stroke-width="1"/>
  <text x="425" y="234" text-anchor="middle" font-size="10" fill="#1e8449">Firma JWT con</text>
  <text x="425" y="246" text-anchor="middle" font-size="10" fill="#1e8449">JWT_SECRET_KEY</text>
  <line x1="415" y1="260" x2="95" y2="260" stroke="#1e8449" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr2)"/>
  <text x="255" y="255" text-anchor="middle" font-size="10" fill="#1e8449">access_token + refresh_token</text>

  <!-- PASO 3: Payload del JWT -->
  <rect x="30" y="278" width="820" height="22" rx="4" fill="#eaf4fb" opacity="0.5"/>
  <text x="40" y="293" font-size="11" font-weight="bold" fill="#1a5276">③ Payload embebido en el token</text>
  <rect x="290" y="298" width="280" height="60" rx="6" fill="#1a5276" opacity="0.08" stroke="#1a5276" stroke-width="1"/>
  <text x="430" y="314" text-anchor="middle" font-size="10" fill="#1a5276">{ user_id, email, rol,</text>
  <text x="430" y="328" text-anchor="middle" font-size="10" fill="#1a5276">  departamento, rut,</text>
  <text x="430" y="342" text-anchor="middle" font-size="10" fill="#1a5276">  first_name, last_name }</text>

  <!-- PASO 4: Request con token -->
  <rect x="30" y="372" width="820" height="22" rx="4" fill="#f9ebea" opacity="0.5"/>
  <text x="40" y="387" font-size="11" font-weight="bold" fill="#922b21">④ Request autenticado</text>
  <line x1="85" y1="395" x2="245" y2="395" stroke="#2980b9" stroke-width="2" marker-end="url(#arr)"/>
  <text x="165" y="390" text-anchor="middle" font-size="10" fill="#2980b9">Bearer token</text>
  <line x1="255" y1="405" x2="585" y2="405" stroke="#1a5276" stroke-width="2" marker-end="url(#arr)"/>
  <text x="420" y="400" text-anchor="middle" font-size="10" fill="#1a5276">Authorization: Bearer &lt;token&gt;</text>

  <!-- PASO 5: Validación local -->
  <rect x="30" y="423" width="820" height="22" rx="4" fill="#f9ebea" opacity="0.5"/>
  <text x="40" y="438" font-size="11" font-weight="bold" fill="#922b21">⑤ Validación local (sin consultar BD)</text>
  <rect x="535" y="440" width="130" height="30" rx="6" fill="#7d3c98" opacity="0.12" stroke="#7d3c98" stroke-width="1"/>
  <text x="600" y="456" text-anchor="middle" font-size="10" fill="#7d3c98">Verifica firma JWT</text>
  <text x="600" y="468" text-anchor="middle" font-size="10" fill="#7d3c98">Lee rol del payload</text>

  <line x1="255" y1="475" x2="755" y2="475" stroke="#922b21" stroke-width="2" marker-end="url(#arr)"/>
  <text x="505" y="470" text-anchor="middle" font-size="10" fill="#922b21">mismo JWT → servicio-3 también valida localmente</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arr2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1e8449"/>
    </marker>
  </defs>
</svg>
